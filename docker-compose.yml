version: "3.8"

services:
  bot:
    build: .
    container_name: korean_car_bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DEBUG=${DEBUG:-False}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
